<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Brawl Style Game</title>

<style>

body{
margin:0;
background:#1e1e1e;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
}

canvas{
background:#3aa655;
border:4px solid black;
}

</style>
</head>

<body>

<canvas id="game" width="1000" height="650"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let mouseX=0
let mouseY=0

canvas.addEventListener("mousemove",e=>{

let rect=canvas.getBoundingClientRect()

mouseX=e.clientX-rect.left
mouseY=e.clientY-rect.top

})

let keys={}

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.key==="Shift")shoot()
if(e.key===" ")superShot()

})

document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:500,
y:320,
size:22,
speed:3.8,
hp:100,
maxHp:100,
super:0
}

let bullets=[]
let enemyBullets=[]
let enemies=[]
let score=0

let walls=[

{x:200,y:200,w:150,h:40},
{x:650,y:300,w:200,h:40},
{x:450,y:100,w:40,h:200},
{x:100,y:450,w:200,h:40}

]

let bushes=[

{x:350,y:420,w:120,h:80},
{x:750,y:150,w:120,h:80}

]

function shoot(){

let angle=Math.atan2(mouseY-player.y,mouseX-player.x)

bullets.push({

x:player.x,
y:player.y,
dx:Math.cos(angle)*8,
dy:Math.sin(angle)*8,
size:6

})

}

function superShot(){

if(player.super<100)return

player.super=0

for(let i=0;i<12;i++){

let angle=(Math.PI*2/12)*i

bullets.push({

x:player.x,
y:player.y,
dx:Math.cos(angle)*7,
dy:Math.sin(angle)*7,
size:6

})

}

}

function spawnEnemy(){

if(enemies.length>=10)return

let x=Math.random()*1000
let y=Math.random()*650

enemies.push({

x:x,
y:y,
size:20,
hp:40,
cool:0

})

}

setInterval(spawnEnemy,1500)

function collideRect(x,y,size,w){

return(
x+size>w.x &&
x-size<w.x+w.w &&
y+size>w.y &&
y-size<w.y+w.h
)

}

function update(){

if(player.hp<=0){

alert("GAME OVER\nScore:"+score)
location.reload()

}

if(keys["w"])player.y-=player.speed
if(keys["s"])player.y+=player.speed
if(keys["a"])player.x-=player.speed
if(keys["d"])player.x+=player.speed

walls.forEach(w=>{

if(collideRect(player.x,player.y,player.size,w)){

if(keys["w"])player.y+=player.speed
if(keys["s"])player.y-=player.speed
if(keys["a"])player.x+=player.speed
if(keys["d"])player.x-=player.speed

}

})

bullets.forEach((b,bi)=>{

b.x+=b.dx
b.y+=b.dy

walls.forEach(w=>{
if(collideRect(b.x,b.y,4,w))bullets.splice(bi,1)
})

})

enemyBullets.forEach((b,bi)=>{

b.x+=b.dx
b.y+=b.dy

})

enemies.forEach((e,ei)=>{

let angle=Math.atan2(player.y-e.y,player.x-e.x)

e.x+=Math.cos(angle)*1.2
e.y+=Math.sin(angle)*1.2

e.cool--

if(e.cool<=0){

enemyBullets.push({

x:e.x,
y:e.y,
dx:Math.cos(angle)*4,
dy:Math.sin(angle)*4,
size:5

})

e.cool=120

}

})

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

let dx=b.x-e.x
let dy=b.y-e.y

if(Math.sqrt(dx*dx+dy*dy)<e.size){

e.hp-=20
bullets.splice(bi,1)

if(e.hp<=0){

enemies.splice(ei,1)
score++
player.super+=20

}

}

})

})

enemyBullets.forEach((b,bi)=>{

let dx=b.x-player.x
let dy=b.y-player.y

if(Math.sqrt(dx*dx+dy*dy)<player.size){

player.hp-=10
enemyBullets.splice(bi,1)

}

})

}

function draw(){

ctx.clearRect(0,0,1000,650)

walls.forEach(w=>{

ctx.fillStyle="#777"
ctx.fillRect(w.x,w.y,w.w,w.h)

})

bushes.forEach(b=>{

ctx.fillStyle="#2d8f3f"
ctx.fillRect(b.x,b.y,b.w,b.h)

})

ctx.fillStyle="blue"
ctx.beginPath()
ctx.arc(player.x,player.y,20,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.fillRect(player.x-25,player.y-35,50,6)

ctx.fillStyle="red"
ctx.fillRect(player.x-25,player.y-35,50*(player.hp/player.maxHp),6)

bullets.forEach(b=>{

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(b.x,b.y,5,0,Math.PI*2)
ctx.fill()

})

enemyBullets.forEach(b=>{

ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(b.x,b.y,5,0,Math.PI*2)
ctx.fill()

})

enemies.forEach(e=>{

ctx.fillStyle="red"
ctx.fillRect(e.x-10,e.y,20,25)

ctx.beginPath()
ctx.arc(e.x,e.y-10,10,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.fillRect(e.x-20,e.y-25,40,5)

ctx.fillStyle="green"
ctx.fillRect(e.x-20,e.y-25,40*(e.hp/40),5)

})

ctx.fillStyle="white"
ctx.font="20px Arial"

ctx.fillText("HP: "+player.hp,20,30)
ctx.fillText("Score: "+score,20,60)
ctx.fillText("Super: "+player.super+"%",20,90)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Open World RPG</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:sans-serif;
}

.bar{
width:200px;
height:20px;
background:#333;
margin-bottom:5px;
}

.fill{
height:100%;
background:red;
}

#stamina .fill{
background:yellow;
}

</style>
</head>

<body>

<div id="ui">
HP
<div class="bar"><div id="hp" class="fill"></div></div>

Stamina
<div id="stamina" class="bar"><div id="st" class="fill"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.set(0,3,5)

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

const ambient=new THREE.AmbientLight(0x888888)
scene.add(ambient)

//////////////////////////
//// 地形
//////////////////////////

const groundGeo=new THREE.PlaneGeometry(200,200,50,50)

for(let i=0;i<groundGeo.attributes.position.count;i++){

let y=Math.random()*0.5
groundGeo.attributes.position.setZ(i,y)

}

groundGeo.computeVertexNormals()

const groundMat=new THREE.MeshStandardMaterial({color:0x3a8f3a})

const ground=new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x=-Math.PI/2

scene.add(ground)

//////////////////////////
//// 木
//////////////////////////

function createTree(x,z){

const trunk=new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,2),
new THREE.MeshStandardMaterial({color:0x8b5a2b})
)

trunk.position.set(x,1,z)

const leaves=new THREE.Mesh(
new THREE.SphereGeometry(1.5),
new THREE.MeshStandardMaterial({color:0x2e8b57})
)

leaves.position.set(x,3,z)

scene.add(trunk)
scene.add(leaves)

}

for(let i=0;i<40;i++){
createTree(
Math.random()*100-50,
Math.random()*100-50
)
}

//////////////////////////
//// 岩
//////////////////////////

function createRock(x,z){

const rock=new THREE.Mesh(
new THREE.DodecahedronGeometry(Math.random()+0.5),
new THREE.MeshStandardMaterial({color:0x777777})
)

rock.position.set(x,0.5,z)
scene.add(rock)

}

for(let i=0;i<25;i++){
createRock(
Math.random()*100-50,
Math.random()*100-50
)
}

//////////////////////////
//// プレイヤー（人型）
//////////////////////////

const player=new THREE.Group()

const body=new THREE.Mesh(
new THREE.BoxGeometry(0.8,1.2,0.4),
new THREE.MeshStandardMaterial({color:0x3366ff})
)

body.position.y=1.2

const head=new THREE.Mesh(
new THREE.SphereGeometry(0.35),
new THREE.MeshStandardMaterial({color:0xffccaa})
)

head.position.y=2

player.add(body)
player.add(head)

scene.add(player)

//////////////////////////
//// 剣
//////////////////////////

const sword=new THREE.Mesh(
new THREE.BoxGeometry(0.1,1,0.1),
new THREE.MeshStandardMaterial({color:0xcccccc})
)

sword.position.set(0.6,1.2,0)
player.add(sword)

let swordSwing=0

//////////////////////////
//// モンスター
//////////////////////////

const monsters=[]

function createMonster(x,z){

const m=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0xaa2222})
)

m.position.set(x,0.5,z)

m.hp=3

scene.add(m)
monsters.push(m)

}

for(let i=0;i<8;i++){
createMonster(
Math.random()*60-30,
Math.random()*60-30
)
}

//////////////////////////
//// HPとスタミナ
//////////////////////////

let hp=100
let stamina=100

const hpBar=document.getElementById("hp")
const stBar=document.getElementById("st")

//////////////////////////
//// マウス視点
//////////////////////////

let yaw=0
let pitch=0

document.addEventListener("mousemove",e=>{

yaw-=e.movementX*0.002
pitch-=e.movementY*0.002

pitch=Math.max(-1,Math.min(1,pitch))

})

//////////////////////////
//// 操作
//////////////////////////

const keys={}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

//////////////////////////
//// 攻撃
//////////////////////////

function attack(){

if(stamina<10)return

stamina-=10
swordSwing=0.3

monsters.forEach(m=>{

if(m.position.distanceTo(player.position)<2){

m.hp--

createHitEffect(m.position)

if(m.hp<=0){

scene.remove(m)

}

}

})

}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){
attack()
}

})

//////////////////////////
//// ヒットエフェクト
//////////////////////////

function createHitEffect(pos){

const p=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xffff00})
)

p.position.copy(pos)

scene.add(p)

setTimeout(()=>scene.remove(p),200)

}

//////////////////////////
//// 昼夜
//////////////////////////

let time=0

//////////////////////////
//// ゲームループ
//////////////////////////

function animate(){

requestAnimationFrame(animate)

time+=0.001

light.intensity=1+Math.sin(time)*0.5

/////////////////
//// 移動
/////////////////

const speed=0.15

let dir=new THREE.Vector3()

if(keys["w"])dir.z-=1
if(keys["s"])dir.z+=1
if(keys["a"])dir.x-=1
if(keys["d"])dir.x+=1

dir.normalize()

player.position.x+=dir.x*speed
player.position.z+=dir.z*speed

/////////////////
//// カメラ
/////////////////

camera.position.x=player.position.x+Math.sin(yaw)*5
camera.position.z=player.position.z+Math.cos(yaw)*5
camera.position.y=3

camera.lookAt(player.position)

/////////////////
//// 剣アニメーション
/////////////////

if(swordSwing>0){

sword.rotation.z=-Math.sin(swordSwing*10)*1.5
swordSwing-=0.02

}else{

sword.rotation.z=0

}

/////////////////
//// スタミナ回復
/////////////////

stamina=Math.min(100,stamina+0.05)

hpBar.style.width=hp*2+"px"
stBar.style.width=stamina*2+"px"

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>

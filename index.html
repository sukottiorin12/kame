<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Genshin-style RPG</title>

<style>
body{margin:0;overflow:hidden;background:black}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:sans-serif;
}

.bar{
width:220px;
height:18px;
background:#333;
margin-bottom:5px;
}

.fill{
height:100%;
background:red;
}

#stamina .fill{
background:yellow;
}
</style>
</head>

<body>

<div id="ui">

HP
<div class="bar"><div id="hp" class="fill"></div></div>

Stamina
<div id="stamina" class="bar"><div id="st" class="fill"></div></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

const renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

///////////////////////
//// 光（昼夜）
///////////////////////

const sun=new THREE.DirectionalLight(0xffffff,1)
sun.position.set(20,50,20)
scene.add(sun)

scene.add(new THREE.AmbientLight(0x666666))

///////////////////////
//// 地形
///////////////////////

const geo=new THREE.PlaneGeometry(500,500,200,200)

for(let i=0;i<geo.attributes.position.count;i++){

let h=
Math.sin(i*0.05)*2+
Math.cos(i*0.1)*1+
Math.random()*0.5

geo.attributes.position.setZ(i,h)

}

geo.computeVertexNormals()

const ground=new THREE.Mesh(
geo,
new THREE.MeshStandardMaterial({color:0x3a8f3a})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)

///////////////////////
//// 木
///////////////////////

function tree(x,z){

const trunk=new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.3,3),
new THREE.MeshStandardMaterial({color:0x8b5a2b})
)

trunk.position.set(x,1.5,z)

const leaves=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshStandardMaterial({color:0x2e8b57})
)

leaves.position.set(x,4,z)

scene.add(trunk)
scene.add(leaves)

}

for(let i=0;i<120;i++){

tree(
Math.random()*400-200,
Math.random()*400-200
)

}

///////////////////////
//// 岩
///////////////////////

for(let i=0;i<60;i++){

const rock=new THREE.Mesh(
new THREE.DodecahedronGeometry(Math.random()*2+1),
new THREE.MeshStandardMaterial({color:0x777777})
)

rock.position.set(
Math.random()*400-200,
1,
Math.random()*400-200
)

scene.add(rock)

}

///////////////////////
//// プレイヤー
///////////////////////

const player=new THREE.Group()

const body=new THREE.Mesh(
new THREE.BoxGeometry(1,1.5,0.6),
new THREE.MeshStandardMaterial({color:0x3366ff})
)

body.position.y=1.3

const head=new THREE.Mesh(
new THREE.SphereGeometry(0.4),
new THREE.MeshStandardMaterial({color:0xffccaa})
)

head.position.y=2.3

player.add(body)
player.add(head)

scene.add(player)

///////////////////////
//// 剣
///////////////////////

const sword=new THREE.Mesh(
new THREE.BoxGeometry(0.1,1.2,0.1),
new THREE.MeshStandardMaterial({color:0xdddddd})
)

sword.position.set(0.7,1.3,0)

player.add(sword)

let swing=0

///////////////////////
//// モンスター
///////////////////////

const monsters=[]

function spawn(type,x,z){

const m=new THREE.Group()

const body=new THREE.Mesh(
new THREE.BoxGeometry(1,1.5,0.6),
new THREE.MeshStandardMaterial({color:0xaa2222})
)

body.position.y=1.3

const head=new THREE.Mesh(
new THREE.SphereGeometry(0.35),
new THREE.MeshStandardMaterial({color:0xffaaaa})
)

head.position.y=2.2

m.add(body)
m.add(head)

m.position.set(x,0,z)

if(type==1){
m.speed=0.03
m.hp=3
}

if(type==2){
m.speed=0.06
m.hp=2
body.material.color.set(0xff4444)
}

if(type==3){
m.speed=0.02
m.hp=6
body.material.color.set(0x551111)
}

scene.add(m)
monsters.push(m)

}

for(let i=0;i<20;i++){

spawn(
Math.ceil(Math.random()*3),
Math.random()*200-100,
Math.random()*200-100
)

}

///////////////////////
//// ステータス
///////////////////////

let hp=100
let stamina=100

const hpBar=document.getElementById("hp")
const stBar=document.getElementById("st")

///////////////////////
//// マウス視点
///////////////////////

let yaw=0

document.addEventListener("mousemove",e=>{

yaw-=e.movementX*0.002

})

///////////////////////
//// キー
///////////////////////

const keys={}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

///////////////////////
//// 攻撃
///////////////////////

function attack(){

if(stamina<10)return

stamina-=10
swing=0.35

monsters.forEach(m=>{

if(m.position.distanceTo(player.position)<2){

m.hp--

effect(m.position)

if(m.hp<=0){
scene.remove(m)
}

}

})

}

document.addEventListener("keydown",e=>{

if(e.code==="Space")attack()

})

///////////////////////
//// ヒットエフェクト
///////////////////////

function effect(p){

const e=new THREE.Mesh(
new THREE.SphereGeometry(0.3),
new THREE.MeshBasicMaterial({color:0xffff00})
)

e.position.copy(p)

scene.add(e)

setTimeout(()=>scene.remove(e),200)

}

///////////////////////
//// 昼夜
///////////////////////

let time=0

///////////////////////
//// ループ
///////////////////////

function animate(){

requestAnimationFrame(animate)

time+=0.002

sun.intensity=1+Math.sin(time)*0.6

////////////////////
//// 移動
////////////////////

let dir=new THREE.Vector3()

if(keys["w"])dir.z-=1
if(keys["s"])dir.z+=1
if(keys["a"])dir.x-=1
if(keys["d"])dir.x+=1

dir.normalize()

player.position.x+=dir.x*0.25
player.position.z+=dir.z*0.25

player.rotation.y=yaw

////////////////////
//// カメラ
////////////////////

camera.position.x=player.position.x+Math.sin(yaw)*8
camera.position.z=player.position.z+Math.cos(yaw)*8
camera.position.y=5

camera.lookAt(player.position)

////////////////////
//// 剣
////////////////////

if(swing>0){

sword.rotation.z=-Math.sin(swing*10)*1.7
swing-=0.02

}else{
sword.rotation.z=0
}

////////////////////
//// 敵AI
////////////////////

monsters.forEach(m=>{

let d=player.position.clone().sub(m.position)

if(d.length()<20){

d.normalize()

m.position.x+=d.x*m.speed
m.position.z+=d.z*m.speed

}

if(m.position.distanceTo(player.position)<1.5){

hp-=0.05

}

})

////////////////////
//// UI
////////////////////

hpBar.style.width=hp*2+"px"
stBar.style.width=stamina*2+"px"

stamina=Math.min(100,stamina+0.05)

renderer.render(scene,camera)

}

animate()

</script>
</body>
</html>

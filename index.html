<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Open World RPG</title>

<style>

body{
margin:0;
background:#222;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

canvas{
background:#6ec6ff;
border:4px solid black;
}

</style>
</head>

<body>

<canvas id="game" width="900" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:450,
y:300,
speed:3,
size:18,
hp:100
}

let enemies=[]
let bullets=[]
let score=0

let worldSize=2000

function spawnEnemy(){

enemies.push({

x:Math.random()*worldSize,
y:Math.random()*worldSize,
hp:40

})

}

setInterval(spawnEnemy,2000)

let camera={x:0,y:0}

function shoot(){

bullets.push({

x:player.x,
y:player.y,
dx:0,
dy:-7

})

}

document.addEventListener("keydown",e=>{

if(e.key==="Shift")shoot()

})

function update(){

if(keys["w"])player.y-=player.speed
if(keys["s"])player.y+=player.speed
if(keys["a"])player.x-=player.speed
if(keys["d"])player.x+=player.speed

camera.x=player.x-450
camera.y=player.y-300

bullets.forEach(b=>{

b.y+=b.dy

})

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

let dx=b.x-e.x
let dy=b.y-e.y

if(Math.sqrt(dx*dx+dy*dy)<20){

e.hp-=20
bullets.splice(bi,1)

if(e.hp<=0){

enemies.splice(ei,1)
score++

}

}

})

})

enemies.forEach(e=>{

let angle=Math.atan2(player.y-e.y,player.x-e.x)

e.x+=Math.cos(angle)*1
e.y+=Math.sin(angle)*1

})

}

function draw(){

ctx.clearRect(0,0,900,600)

ctx.save()

ctx.translate(-camera.x,-camera.y)

for(let x=0;x<worldSize;x+=100){

for(let y=0;y<worldSize;y+=100){

ctx.fillStyle="#5fbf5f"
ctx.fillRect(x,y,98,98)

}

}

ctx.fillStyle="blue"

ctx.beginPath()
ctx.arc(player.x,player.y,18,0,Math.PI*2)
ctx.fill()

bullets.forEach(b=>{

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(b.x,b.y,5,0,Math.PI*2)
ctx.fill()

})

enemies.forEach(e=>{

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(e.x,e.y,16,0,Math.PI*2)
ctx.fill()

})

ctx.restore()

ctx.fillStyle="white"
ctx.font="20px Arial"
ctx.fillText("HP:"+player.hp,20,30)
ctx.fillText("Score:"+score,20,60)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D RPG Mouse + Effect</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:sans-serif;
}

#hint{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:20px;
}

</style>
</head>

<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Stamina: <span id="stamina">100</span>
</div>

<div id="hint">クリックするとゲーム開始</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)


// ===== ライト =====

let light=new THREE.DirectionalLight(0xffffff,1)

light.position.set(20,40,20)

scene.add(light)

scene.add(new THREE.AmbientLight(0x666666))


// ===== 地面 =====

let ground=new THREE.Mesh(

new THREE.PlaneGeometry(300,300),

new THREE.MeshLambertMaterial({color:0x55aa55})

)

ground.rotation.x=-Math.PI/2

scene.add(ground)


// ===== プレイヤー =====

let player=new THREE.Group()

scene.add(player)

let body=new THREE.Mesh(
new THREE.BoxGeometry(1,2,0.6),
new THREE.MeshLambertMaterial({color:0x3366ff})
)

body.position.y=1
player.add(body)

player.position.y=0.7


// ===== 剣 =====

let sword=new THREE.Mesh(

new THREE.BoxGeometry(0.1,1,0.1),

new THREE.MeshLambertMaterial({color:0xffffff})

)

sword.position.set(-1,1.8,0)

player.add(sword)


// ===== 敵 =====

let enemies=[]

function spawnEnemy(){

let enemy=new THREE.Mesh(

new THREE.BoxGeometry(1.5,1.5,1.5),

new THREE.MeshLambertMaterial({color:0xff3333})

)

enemy.position.x=Math.random()*40-20
enemy.position.z=Math.random()*40-20
enemy.position.y=0.75

enemy.hp=40

scene.add(enemy)

enemies.push(enemy)

}

for(let i=0;i<8;i++)spawnEnemy()


// ===== エフェクト =====

let effects=[]

function spawnEffect(x,y,z){

let e=new THREE.Mesh(

new THREE.SphereGeometry(0.3),

new THREE.MeshBasicMaterial({color:0xffff00})

)

e.position.set(x,y,z)

scene.add(e)

effects.push({mesh:e,life:20})

}


// ===== プレイヤー状態 =====

let hp=100
let stamina=100

let velocityY=0
let onGround=true


// ===== マウスカメラ =====

let yaw=0
let pitch=0

document.body.onclick=()=>{

document.body.requestPointerLock()

document.getElementById("hint").style.display="none"

}

document.addEventListener("mousemove",(e)=>{

if(document.pointerLockElement===document.body){

yaw-=e.movementX*0.002
pitch-=e.movementY*0.002

pitch=Math.max(-1.2,Math.min(1.2,pitch))

}

})


// ===== キー =====

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)


// ===== 攻撃 =====

let attacking=false
let attackTime=0

function attack(){

if(attacking)return

attacking=true
attackTime=0

}


// ===== 更新 =====

function update(){

let speed=0.15

if(keys["Shift"] && stamina>0){

speed=0.3
stamina-=0.2

}

let dirX=Math.sin(yaw)
let dirZ=Math.cos(yaw)

if(keys["w"]){

player.position.x-=dirX*speed
player.position.z-=dirZ*speed

}

if(keys["s"]){

player.position.x+=dirX*speed
player.position.z+=dirZ*speed

}

if(keys["a"]){

player.position.x-=dirZ*speed
player.position.z+=dirX*speed

}

if(keys["d"]){

player.position.x+=dirZ*speed
player.position.z-=dirX*speed

}


// ===== ジャンプ =====

if(keys["j"] && onGround){

velocityY=0.25
onGround=false

}

player.position.y+=velocityY

velocityY-=0.01

if(player.position.y<=0.7){

player.position.y=0.7
velocityY=0
onGround=true

}


// ===== 剣アニメ =====

if(attacking){

attackTime+=0.2

sword.rotation.z=-Math.sin(attackTime)*2

// 当たり判定

enemies.forEach((e,i)=>{

if(player.position.distanceTo(e.position)<3){

e.hp-=20

spawnEffect(e.position.x,e.position.y,e.position.z)

if(e.hp<=0){

scene.remove(e)
enemies.splice(i,1)

}

}

})

if(attackTime>Math.PI){

attacking=false
sword.rotation.z=0

}

}


// ===== エフェクト更新 =====

effects.forEach((ef,i)=>{

ef.life--

ef.mesh.scale.multiplyScalar(1.1)

if(ef.life<=0){

scene.remove(ef.mesh)

effects.splice(i,1)

}

})


// ===== カメラ =====

camera.position.x=player.position.x + Math.sin(yaw)*6
camera.position.z=player.position.z + Math.cos(yaw)*6
camera.position.y=player.position.y + 4

camera.lookAt(
player.position.x,
player.position.y+1,
player.position.z
)


// ===== UI =====

document.getElementById("hp").innerText=Math.floor(hp)
document.getElementById("stamina").innerText=Math.floor(stamina)

}


// ===== キー =====

document.addEventListener("keydown",e=>{

if(e.key===" ")attack()

})


// ===== ループ =====

function animate(){

requestAnimationFrame(animate)

update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>

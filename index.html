```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>スロットゲーム</title>

<style>

body{
background:linear-gradient(#111,#333);
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
margin-top:20px;
}

#machine{
background:#222;
border:5px solid gold;
border-radius:20px;
display:inline-block;
padding:20px;
}

.slot{
font-size:70px;
background:black;
width:90px;
display:inline-block;
margin:10px;
border:3px solid silver;
border-radius:10px;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
cursor:pointer;
border-radius:8px;
border:none;
background:gold;
}

button:hover{
background:orange;
}

</style>
</head>

<body>

<h1>🎰 スロットゲーム 🎰</h1>

<h2>コイン: <span id="coin">10</span></h2>
<h3>ハイスコア: <span id="highscore">0</span></h3>

<div id="machine">

<div>
<span id="slot1" class="slot">🍒</span>
<span id="slot2" class="slot">🍋</span>
<span id="slot3" class="slot">⭐</span>
</div>

<br>

<button onclick="start()">回す</button><br>
<button onclick="stopSlot(1)">STOP1</button>
<button onclick="stopSlot(2)">STOP2</button>
<button onclick="stopSlot(3)">STOP3</button>

</div>

<p id="result"></p>

<script>

let items=["🍒","🍋","🔔","⭐","🍇"];

let coins=10;

let spinning=[false,false,false];

let interval1,interval2,interval3;

let highscore=localStorage.getItem("slotHighScore") || 0;
document.getElementById("highscore").textContent=highscore;

function start(){

if(coins<=0){
document.getElementById("result").textContent="コインがありません";
return;
}

coins--;
document.getElementById("coin").textContent=coins;

spinning=[true,true,true];

interval1=setInterval(()=>spinSlot(1),100);
interval2=setInterval(()=>spinSlot(2),100);
interval3=setInterval(()=>spinSlot(3),100);

document.getElementById("result").textContent="止めてください！";

}

function spinSlot(n){

let item=items[Math.floor(Math.random()*items.length)];
document.getElementById("slot"+n).textContent=item;

}

function stopSlot(n){

if(!spinning[n-1]) return;

spinning[n-1]=false;

clearInterval(window["interval"+n]);

checkResult();

}

function checkResult(){

if(spinning.includes(true)) return;

let s1=document.getElementById("slot1").textContent;
let s2=document.getElementById("slot2").textContent;
let s3=document.getElementById("slot3").textContent;

if(s1===s2 && s2===s3){

coins+=10;
document.getElementById("coin").textContent=coins;
document.getElementById("result").textContent="🎉 JACKPOT +10コイン";

if(coins>highscore){
highscore=coins;
localStorage.setItem("slotHighScore",highscore);
document.getElementById("highscore").textContent=highscore;
}

}else{

document.getElementById("result").textContent="はずれ";

}

}

</script>

</body>
</html>
```

```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>777スロットゲーム</title>

<style>

body{
background:linear-gradient(#000,#222);
color:white;
text-align:center;
font-family:sans-serif;
overflow:hidden;
}

#topbar{
position:absolute;
right:20px;
top:20px;
text-align:right;
}

#machine{
background:#111;
border:6px solid gold;
border-radius:20px;
display:inline-block;
padding:30px;
box-shadow:0 0 20px gold;
margin-top:60px;
}

.slot{
font-size:70px;
background:black;
width:100px;
display:inline-block;
margin:10px;
border:3px solid silver;
border-radius:10px;
}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:gold;
cursor:pointer;
}

button:hover{
background:orange;
}

.win{
animation:flash 0.5s infinite;
}

.jackpot{
animation:rainbow 0.3s infinite;
}

.shake{
animation:shake 0.3s infinite;
}

@keyframes flash{
0%{box-shadow:0 0 10px yellow;}
50%{box-shadow:0 0 30px red;}
100%{box-shadow:0 0 10px yellow;}
}

@keyframes rainbow{
0%{box-shadow:0 0 20px red;}
25%{box-shadow:0 0 20px yellow;}
50%{box-shadow:0 0 20px lime;}
75%{box-shadow:0 0 20px cyan;}
100%{box-shadow:0 0 20px magenta;}
}

@keyframes shake{
0%{transform:translate(0px,0px);}
25%{transform:translate(5px,-5px);}
50%{transform:translate(-5px,5px);}
75%{transform:translate(5px,5px);}
100%{transform:translate(0px,0px);}
}

.confetti{
position:absolute;
width:10px;
height:10px;
background:red;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(800px) rotate(720deg);}
}

</style>
</head>

<body>

<div id="topbar">
コイン: <span id="coin">50</span><br>
借金: <span id="debt">0</span><br>
<button onclick="borrow()">借金 (+50)</button><br>
<button onclick="repay()">返済 (-50)</button>
</div>

<h1>🎰 スロットゲーム 🎰</h1>

<div id="machine">

<div>
<span id="slot1" class="slot">🍒</span>
<span id="slot2" class="slot">🍋</span>
<span id="slot3" class="slot">⭐</span>
</div>

<br>

<button onclick="start()">回す</button>
<br>
<button onclick="stopSlot(0)">STOP</button>
<button onclick="stopSlot(1)">STOP</button>
<button onclick="stopSlot(2)">STOP</button>

</div>

<p id="result"></p>

<script>

let items=["🍒","🍋","🔔","⭐","🍇","7️⃣","7️⃣"]; 
// 7を1つ減らした

let coins=50;
let debt=0;

let intervals=[null,null,null];
let spinning=[false,false,false];

let stopIndex=0;

function start(){

if(coins<=0){
document.getElementById("result").textContent="コインがありません";
return;
}

coins--;
document.getElementById("coin").textContent=coins;

stopIndex=0;

document.getElementById("machine").classList.remove("win","jackpot","shake");

for(let i=0;i<3;i++){

spinning[i]=true;

intervals[i]=setInterval(()=>{

let item=items[Math.floor(Math.random()*items.length)];
document.getElementById("slot"+(i+1)).textContent=item;

},100);

}

}

function stopSlot(n){

if(!spinning[n]) return;

clearInterval(intervals[n]);

spinning[n]=false;

checkResult();

}

function checkResult(){

if(spinning.includes(true)) return;

let s1=document.getElementById("slot1").textContent;
let s2=document.getElementById("slot2").textContent;
let s3=document.getElementById("slot3").textContent;

if(s1==="7️⃣" && s2==="7️⃣" && s3==="7️⃣"){

coins+=50;

document.getElementById("coin").textContent=coins;

document.getElementById("result").textContent="🌈 777 JACKPOT!!! +50";

let machine=document.getElementById("machine");

machine.classList.add("jackpot");
machine.classList.add("shake");

confetti();

}

else if(s1===s2 && s2===s3){

coins+=10;

document.getElementById("coin").textContent=coins;

document.getElementById("result").textContent="🎉 当たり +10";

document.getElementById("machine").classList.add("win");

}

else{

document.getElementById("result").textContent="はずれ";

}

}

function borrow(){

coins+=50;
debt+=50;

document.getElementById("coin").textContent=coins;
document.getElementById("debt").textContent=debt;

}

function repay(){

if(coins>=50 && debt>=50){

coins-=50;
debt-=50;

document.getElementById("coin").textContent=coins;
document.getElementById("debt").textContent=debt;

}

}

document.addEventListener("keydown",function(e){

if(e.code==="Space"){

if(stopIndex<3){

stopSlot(stopIndex);
stopIndex++;

}

}

});

function confetti(){

for(let i=0;i<50;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*window.innerWidth+"px";

c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;

document.body.appendChild(c);

setTimeout(()=>{c.remove();},3000);

}

}

</script>

</body>
</html>
```

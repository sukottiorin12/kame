<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Open World RPG</title>
<style>
body{margin:0;overflow:hidden;background:black}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:sans-serif;
}
</style>
</head>

<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Items: <span id="items">0</span><br>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(20,40,20)
scene.add(light)

let ambient=new THREE.AmbientLight(0x888888)
scene.add(ambient)

let groundGeo=new THREE.PlaneGeometry(300,300)
let groundMat=new THREE.MeshLambertMaterial({color:0x4caf50})
let ground=new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x=-Math.PI/2
scene.add(ground)

let playerGeo=new THREE.BoxGeometry(1,2,1)
let playerMat=new THREE.MeshLambertMaterial({color:0x3366ff})
let player=new THREE.Mesh(playerGeo,playerMat)
player.position.y=1
scene.add(player)

camera.position.set(0,5,10)

let playerHP=100
let items=0

let velocityY=0
let onGround=true

let monsters=[]
let boss=null
let arrows=[]

function spawnMonster(){

let geo=new THREE.BoxGeometry(1.5,1.5,1.5)
let mat=new THREE.MeshLambertMaterial({color:0xff3333})
let m=new THREE.Mesh(geo,mat)

m.position.x=Math.random()*100-50
m.position.z=Math.random()*100-50
m.position.y=0.75

m.hp=30

scene.add(m)
monsters.push(m)

}

for(let i=0;i<10;i++)spawnMonster()

function spawnBoss(){

let geo=new THREE.BoxGeometry(4,4,4)
let mat=new THREE.MeshLambertMaterial({color:0xaa0000})

boss=new THREE.Mesh(geo,mat)
boss.position.set(20,2,20)
boss.hp=200

scene.add(boss)

}

spawnBoss()

function createTree(x,z){

let trunk=new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.3,2),
new THREE.MeshLambertMaterial({color:0x8b4513})
)

trunk.position.set(x,1,z)

scene.add(trunk)

let leaf=new THREE.Mesh(
new THREE.SphereGeometry(1.5),
new THREE.MeshLambertMaterial({color:0x228b22})
)

leaf.position.set(x,3,z)

scene.add(leaf)

}

function createRock(x,z){

let rock=new THREE.Mesh(
new THREE.DodecahedronGeometry(1),
new THREE.MeshLambertMaterial({color:0x777777})
)

rock.position.set(x,1,z)
scene.add(rock)

}

for(let i=0;i<25;i++)createTree(Math.random()*200-100,Math.random()*200-100)
for(let i=0;i<20;i++)createRock(Math.random()*200-100,Math.random()*200-100)

let itemMeshes=[]

function spawnItem(x,z){

let item=new THREE.Mesh(
new THREE.SphereGeometry(0.5),
new THREE.MeshLambertMaterial({color:0xffff00})
)

item.position.set(x,0.5,z)
scene.add(item)

itemMeshes.push(item)

}

spawnItem(5,5)
spawnItem(-10,15)

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function swordAttack(){

monsters.forEach((m,i)=>{

if(player.position.distanceTo(m.position)<3){

m.hp-=20

if(m.hp<=0){

spawnItem(m.position.x,m.position.z)
scene.remove(m)
monsters.splice(i,1)

}

}

})

if(boss && player.position.distanceTo(boss.position)<5){

boss.hp-=20

if(boss.hp<=0){

scene.remove(boss)
boss=null

}

}

}

function shootArrow(){

let geo=new THREE.BoxGeometry(0.2,0.2,1)

let arrow=new THREE.Mesh(
geo,
new THREE.MeshLambertMaterial({color:0xffffff})
)

arrow.position.copy(player.position)

arrow.dir=new THREE.Vector3(0,0,-1)

scene.add(arrow)

arrows.push(arrow)

}

document.addEventListener("keydown",e=>{

if(e.key===" ")swordAttack()

if(e.key==="f")shootArrow()

})

let time=0

function update(){

let speed=0.2

if(keys["w"])player.position.z-=speed
if(keys["s"])player.position.z+=speed
if(keys["a"])player.position.x-=speed
if(keys["d"])player.position.x+=speed

if(keys["j"] && onGround){

velocityY=0.25
onGround=false

}

player.position.y+=velocityY
velocityY-=0.01

if(player.position.y<=1){

player.position.y=1
velocityY=0
onGround=true

}

monsters.forEach(m=>{

let dir=player.position.clone().sub(m.position)

dir.normalize()

m.position.add(dir.multiplyScalar(0.02))

if(player.position.distanceTo(m.position)<2){

playerHP-=0.1

}

})

if(boss){

let dir=player.position.clone().sub(boss.position)

dir.normalize()

boss.position.add(dir.multiplyScalar(0.015))

if(player.position.distanceTo(boss.position)<3){

playerHP-=0.2

}

}

arrows.forEach((a,i)=>{

a.position.add(a.dir.clone().multiplyScalar(0.5))

monsters.forEach((m,mi)=>{

if(a.position.distanceTo(m.position)<1){

m.hp-=20
scene.remove(a)
arrows.splice(i,1)

}

})

})

itemMeshes.forEach((it,i)=>{

if(player.position.distanceTo(it.position)<2){

items++
scene.remove(it)
itemMeshes.splice(i,1)

}

})

if(keys["e"] && items>0){

playerHP=Math.min(100,playerHP+30)
items--

}

document.getElementById("hp").innerText=Math.floor(playerHP)
document.getElementById("items").innerText=items

time+=0.001

let brightness=(Math.sin(time)+1)/2

scene.background=new THREE.Color(brightness*0.5,brightness*0.7,brightness)

light.intensity=brightness+0.2

camera.position.x=player.position.x
camera.position.z=player.position.z+10
camera.position.y=player.position.y+5

camera.lookAt(player.position)

}

function animate(){

requestAnimationFrame(animate)

update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
